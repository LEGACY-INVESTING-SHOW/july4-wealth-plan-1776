<!--
  Replace YOUR_WORKER_URL_HERE with your deployed Cloudflare Worker URL.
  Example: https://whop-upsell.your-account.workers.dev
-->
<section class="one-click-upsell" data-worker-url="YOUR_WORKER_URL_HERE">
  <button class="one-click-upsell__button" type="button" id="one-click-upsell-button">
    <span class="one-click-upsell__spinner" aria-hidden="true"></span>
    <span class="one-click-upsell__button-text">Yes, Add the Blueprint + AI to My Order</span>
  </button>
  <p class="one-click-upsell__message" id="one-click-upsell-message" role="status"></p>
</section>

<style>
  .one-click-upsell {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    display: grid;
    gap: 0.75rem;
  }

  .one-click-upsell__button {
    width: 100%;
    min-height: 56px;
    border: 0;
    border-radius: 14px;
    padding: 0.95rem 1.25rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.65rem;
    background: #18654a;
    color: #fff;
    font: 700 1rem/1.3 "Plus Jakarta Sans", system-ui, sans-serif;
    cursor: pointer;
    transition: background 160ms ease, opacity 160ms ease, transform 160ms ease;
  }

  .one-click-upsell__button:hover:not(:disabled) {
    background: #1f8a63;
    transform: translateY(-1px);
  }

  .one-click-upsell__button:disabled {
    cursor: not-allowed;
    opacity: 0.68;
  }

  .one-click-upsell__spinner {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    display: none;
    animation: one-click-spin 700ms linear infinite;
  }

  .one-click-upsell.is-loading .one-click-upsell__spinner {
    display: inline-block;
  }

  .one-click-upsell__message {
    min-height: 1.4em;
    color: #585e66;
    font: 500 0.9rem/1.55 "Plus Jakarta Sans", system-ui, sans-serif;
    text-align: center;
  }

  .one-click-upsell__message.is-error {
    color: #b42318;
  }

  .one-click-upsell__message.is-success {
    color: #18654a;
  }

  @keyframes one-click-spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 640px) {
    .one-click-upsell__button {
      min-height: 52px;
      font-size: 0.95rem;
      padding: 0.9rem 1rem;
    }
  }
</style>

<script>
  (function () {
    var THANK_YOU_URL = "https://wealth.managemoney101.com/orderconfirmation";
    var storageKey = "whop_initial_payment_id";
    var cookieName = "whop_initial_payment_id";
    var root = document.querySelector(".one-click-upsell");
    var button = document.getElementById("one-click-upsell-button");
    var message = document.getElementById("one-click-upsell-message");

    if (!root || !button || !message) return;

    function setMessage(text, type) {
      message.textContent = text || "";
      message.classList.toggle("is-error", type === "error");
      message.classList.toggle("is-success", type === "success");
    }

    function getParamFromUrl(url, key) {
      try {
        return new URL(url).searchParams.get(key) || "";
      } catch (error) {
        return "";
      }
    }

    function getCookie(name) {
      return document.cookie
        .split(";")
        .map(function (item) { return item.trim(); })
        .filter(function (item) { return item.indexOf(name + "=") === 0; })
        .map(function (item) { return decodeURIComponent(item.slice(name.length + 1)); })[0] || "";
    }

    function savePaymentId(paymentId) {
      if (!paymentId) return;
      try { sessionStorage.setItem(storageKey, paymentId); } catch (error) {}
      try { localStorage.setItem(storageKey, paymentId); } catch (error) {}
      document.cookie = cookieName + "=" + encodeURIComponent(paymentId) + "; path=/; max-age=86400; SameSite=Lax";
    }

    function findPaymentId() {
      var fromUrl = getParamFromUrl(window.location.href, "payment_id");
      if (fromUrl) {
        savePaymentId(fromUrl);
        return fromUrl;
      }

      var fromReferrer = document.referrer ? getParamFromUrl(document.referrer, "payment_id") : "";
      if (fromReferrer) {
        savePaymentId(fromReferrer);
        return fromReferrer;
      }

      try {
        var fromSession = sessionStorage.getItem(storageKey);
        if (fromSession) return fromSession;
      } catch (error) {}

      try {
        var fromLocal = localStorage.getItem(storageKey);
        if (fromLocal) return fromLocal;
      } catch (error) {}

      return getCookie(cookieName);
    }

    var paymentId = findPaymentId();
    var workerUrl = root.getAttribute("data-worker-url");

    if (!workerUrl || workerUrl === "YOUR_WORKER_URL_HERE") {
      button.disabled = true;
      setMessage("Worker URL is not configured yet.", "error");
      return;
    }

    if (!paymentId) {
      button.disabled = true;
      setMessage("No payment_id found. Please return from the initial checkout before using this upgrade.", "error");
      return;
    }

    button.addEventListener("click", async function () {
      button.disabled = true;
      root.classList.add("is-loading");
      setMessage("Processing your upgrade...", "");

      try {
        var response = await fetch(workerUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ payment_id: paymentId }),
        });

        var data = await response.json().catch(function () {
          return { success: false, error: "Invalid response from payment server." };
        });

        if (!response.ok || !data.success) {
          throw new Error(data.error || "Payment failed. Please try again.");
        }

        setMessage("Payment successful! Redirecting...", "success");
        var redirect = new URL(THANK_YOU_URL);
        redirect.searchParams.set("payment_id", paymentId);
        if (data.charge_id) redirect.searchParams.set("charge_id", data.charge_id);
        window.location.href = redirect.toString();
      } catch (error) {
        button.disabled = false;
        root.classList.remove("is-loading");
        setMessage(error.message || "Payment failed. Please try again.", "error");
      }
    });
  })();
</script>
